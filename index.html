<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파운드커피 간식 수령 - 학우용 자동 입력</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: #f7f7f8;
      margin: 0;
      padding: 24px;
      color: #222;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: #555; line-height: 1.5; margin: 0 0 16px; }
    label { display: block; margin: 14px 0 6px; font-weight: 600; }
    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #d8d8dc;
      font-size: 16px;
      background: white;
    }
    button {
      margin-top: 18px;
      background: #111;
      color: white;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
    .secondary {
      background: #f3f4f6;
      color: #222;
      margin-top: 10px;
    }
    .note {
      margin-top: 16px;
      font-size: 13px;
      color: #666;
      background: #f3f4f6;
      padding: 12px;
      border-radius: 10px;
    }
    .small {
      font-size: 12px;
      color: #777;
      margin-top: 8px;
    }
    a.direct {
      display: inline-block;
      margin-top: 14px;
      color: #0b57d0;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>간식 수령 폼 바로가기</h1>
    <p>자기 정보만 입력한 뒤 버튼을 누르면, 값이 미리 채워진 Google Form으로 이동합니다. 마지막에 <b>제출</b>만 누르면 됩니다.</p>

    <label for="name">성명</label>
    <input id="name" placeholder="예: 홍길동" />

    <label for="studentId">학번</label>
    <input id="studentId" inputmode="numeric" placeholder="예: 2026511999" />

    <label for="department">학과</label>
    <select id="department">
      <option value="">학과를 선택하세요</option>
      <option>빅데이터융합학과</option>
      <option>소프트웨어보안학과</option>
      <option>인공지능융합학과</option>
    </select>

    <button onclick="goToForm()">미리 입력된 폼 열기</button>
    <button class="secondary" onclick="clearSavedInfo()">저장된 정보 지우기</button>
    <a class="direct" id="directLink" href="#" target="_blank" rel="noopener">직접 링크 열기</a>

    <div class="small">이 기기/브라우저에서는 입력한 정보가 저장되어 다음에 다시 열어도 자동으로 채워집니다.</div>
    <div class="note">
      같은 링크를 다른 학우들에게 공유해도 됩니다. 각자 자기 기기에서 한 번 입력하면 다음부터는 다시 입력할 필요가 없습니다.
    </div>
  </div>

  <script>
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSenG6BlQLQiHc_hPuE71XIwVsYXoGWr6KgROdup2EnuPF1kig/viewform";
    const ENTRY_NAME = "entry.793922929";
    const ENTRY_STUDENT_ID = "entry.1390898428";
    const ENTRY_DEPARTMENT = "entry.1094568554";

    const STORAGE_KEYS = {
      name: "poundCoffee_name",
      studentId: "poundCoffee_studentId",
      department: "poundCoffee_department",
    };

    const nameInput = document.getElementById("name");
    const studentIdInput = document.getElementById("studentId");
    const departmentInput = document.getElementById("department");
    const directLink = document.getElementById("directLink");

    function saveInputs() {
      localStorage.setItem(STORAGE_KEYS.name, nameInput.value.trim());
      localStorage.setItem(STORAGE_KEYS.studentId, studentIdInput.value.trim());
      localStorage.setItem(STORAGE_KEYS.department, departmentInput.value);
      syncLink();
    }

    function loadSavedInputs() {
      const savedName = localStorage.getItem(STORAGE_KEYS.name) || "";
      const savedStudentId = localStorage.getItem(STORAGE_KEYS.studentId) || "";
      const savedDepartment = localStorage.getItem(STORAGE_KEYS.department) || "";

      nameInput.value = savedName;
      studentIdInput.value = savedStudentId;
      departmentInput.value = savedDepartment;
    }

    function buildUrl() {
      const name = encodeURIComponent(nameInput.value.trim());
      const studentId = encodeURIComponent(studentIdInput.value.trim());
      const department = encodeURIComponent(departmentInput.value);

      return `${FORM_URL}?usp=pp_url&${ENTRY_NAME}=${name}&${ENTRY_STUDENT_ID}=${studentId}&${ENTRY_DEPARTMENT}=${department}`;
    }

    function syncLink() {
      directLink.href = buildUrl();
    }

    function goToForm() {
      const name = nameInput.value.trim();
      const studentId = studentIdInput.value.trim();
      const department = departmentInput.value.trim();

      if (!name || !studentId || !department) {
        alert("성명, 학번, 학과를 모두 입력해주세요.");
        return;
      }

      saveInputs();
      window.location.href = buildUrl();
    }

    function clearSavedInfo() {
      localStorage.removeItem(STORAGE_KEYS.name);
      localStorage.removeItem(STORAGE_KEYS.studentId);
      localStorage.removeItem(STORAGE_KEYS.department);

      nameInput.value = "";
      studentIdInput.value = "";
      departmentInput.value = "";
      syncLink();
      alert("저장된 정보를 지웠습니다.");
    }

    nameInput.addEventListener("input", saveInputs);
    studentIdInput.addEventListener("input", saveInputs);
    departmentInput.addEventListener("change", saveInputs);

    loadSavedInputs();
    syncLink();
  </script>
</body>
</html>
